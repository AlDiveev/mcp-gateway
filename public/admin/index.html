<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MCP Gateway — Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    :root {
      --sidebar-w: 240px;
      --brand: #6366f1;
    }
    body { background: #0b0d10; color: #e5e7eb; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    code, pre, .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 12.5px; }

    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w);
      background: #0f1115; border-right: 1px solid #1f2329;
      display: flex; flex-direction: column;
    }
    .sidebar .brand {
      padding: 18px 20px; font-weight: 600; letter-spacing: .2px;
      border-bottom: 1px solid #1f2329; display: flex; align-items: center; gap: 10px;
    }
    .sidebar .brand .logo { width: 28px; height: 28px; border-radius: 6px; background: linear-gradient(135deg, var(--brand), #8b5cf6); display: grid; place-items: center; color:#fff; }
    .sidebar nav { padding: 8px; flex: 1; overflow-y: auto; }
    .sidebar .nav-link {
      color: #9ca3af; border-radius: 8px; padding: 9px 12px; font-size: 14px;
      display: flex; align-items: center; gap: 10px; margin-bottom: 2px;
    }
    .sidebar .nav-link i { font-size: 16px; width: 18px; text-align: center; }
    .sidebar .nav-link:hover { background: #161a20; color: #e5e7eb; }
    .sidebar .nav-link.active { background: rgba(99,102,241,.12); color: #c7d2fe; }
    .sidebar .footer { padding: 12px; border-top: 1px solid #1f2329; font-size: 12px; color: #6b7280; }

    .main { margin-left: var(--sidebar-w); min-height: 100vh; }
    .topbar {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; gap: 12px;
      padding: 12px 24px; background: rgba(11,13,16,.85); backdrop-filter: blur(8px);
      border-bottom: 1px solid #1f2329;
    }
    .topbar h1 { font-size: 18px; font-weight: 600; margin: 0; }
    .content { padding: 24px; }

    .card { background: #11141a; border: 1px solid #1f2329; }
    .card .card-header { background: transparent; border-bottom: 1px solid #1f2329; padding: 14px 18px; }
    .card .card-header h5 { margin: 0; font-size: 14px; font-weight: 600; color: #e5e7eb; }

    .kpi { display: flex; flex-direction: column; gap: 4px; }
    .kpi .label { color: #9ca3af; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
    .kpi .value { font-size: 28px; font-weight: 700; line-height: 1.1; }
    .kpi .sub { color: #6b7280; font-size: 12px; }
    .kpi .icon { position: absolute; top: 16px; right: 16px; opacity: .25; font-size: 34px; }

    .table { color: #d1d5db; }
    .table > :not(caption) > * > * { background: transparent; border-bottom: 1px solid #1f2329; padding: 10px 12px; }
    .table thead th { color: #9ca3af; text-transform: uppercase; font-size: 11px; letter-spacing: .5px; font-weight: 600; }
    .table tbody tr:hover { background: #141821; }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .status-dot.on { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .status-dot.off { background: #6b7280; }

    .chip { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 11.5px; font-weight: 500; }
    .chip.success { background: rgba(34,197,94,.12); color: #4ade80; }
    .chip.danger  { background: rgba(239,68,68,.12); color: #f87171; }
    .chip.warn    { background: rgba(234,179,8,.12); color: #fde047; }
    .chip.muted   { background: #1b2028; color: #9ca3af; }
    .chip.info    { background: rgba(99,102,241,.12); color: #a5b4fc; }

    .empty { padding: 40px; text-align: center; color: #6b7280; }
    .empty i { font-size: 34px; opacity: .5; display: block; margin-bottom: 8px; }

    details > summary { cursor: pointer; color: #9ca3af; list-style: none; }
    details > summary::-webkit-details-marker { display: none; }
    details[open] > summary { color: #e5e7eb; }
    details pre { max-height: 320px; overflow: auto; background: #0b0d10; border: 1px solid #1f2329; padding: 10px; border-radius: 6px; margin-top: 6px; }

    .search-input { background: #0f1115; border: 1px solid #1f2329; color: #e5e7eb; }
    .search-input:focus { background: #0f1115; color: #e5e7eb; border-color: var(--brand); box-shadow: none; }

    .btn-ghost { background: transparent; border: 1px solid #1f2329; color: #d1d5db; }
    .btn-ghost:hover { background: #161a20; color: #fff; }

    .login-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .login-card { width: 100%; max-width: 380px; background: #11141a; border: 1px solid #1f2329; border-radius: 14px; padding: 28px; }
    .login-card .logo { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, var(--brand), #8b5cf6); display: grid; place-items: center; color: #fff; margin-bottom: 16px; }

    .spinner { width: 14px; height: 14px; border: 2px solid #374151; border-top-color: #a5b4fc; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginView" class="login-wrap">
  <div class="login-card">
    <div class="logo"><i class="bi bi-hdd-network"></i></div>
    <h4 class="mb-1">MCP Gateway</h4>
    <p class="text-secondary small mb-4">Sign in to the admin console</p>
    <div class="mb-3">
      <label class="form-label small text-secondary">Email</label>
      <input id="loginUser" type="email" class="form-control search-input form-control-sm" autocomplete="username" />
    </div>
    <div class="mb-3">
      <label class="form-label small text-secondary">Password</label>
      <input id="loginPassword" type="password" class="form-control search-input form-control-sm" autocomplete="current-password" />
    </div>
    <div id="loginError" class="alert alert-danger py-2 px-3 small d-none"></div>
    <button id="loginBtn" class="btn btn-primary w-100">Sign in</button>
  </div>
</div>

<!-- APP -->
<div id="appView" class="d-none">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo"><i class="bi bi-hdd-network"></i></div>
      <span>MCP Gateway</span>
    </div>
    <nav id="nav"></nav>
    <div class="footer">
      <div id="whoami" class="mb-2"></div>
      <button id="logout" class="btn btn-ghost btn-sm w-100"><i class="bi bi-box-arrow-right me-1"></i> Sign out</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h1 id="sectionTitle">Dashboard</h1>
      <span id="status" class="chip muted">idle</span>
      <div class="ms-auto d-flex gap-2 align-items-center">
        <div class="form-check form-switch text-secondary small m-0">
          <input id="autoRefresh" class="form-check-input" type="checkbox" />
          <label for="autoRefresh" class="form-check-label">Auto-refresh</label>
        </div>
        <button id="refresh" class="btn btn-ghost btn-sm"><i class="bi bi-arrow-clockwise"></i></button>
      </div>
    </div>

    <div class="content">
      <div id="toolbar" class="mb-3 d-flex gap-2 flex-wrap"></div>
      <div id="view"></div>
    </div>
  </div>
</div>

<script>
const $ = (s) => document.querySelector(s);
const state = {
  tab: 'dashboard',
  token: localStorage.getItem('apiKey') || '',
  user: localStorage.getItem('userEmail') || '',
  role: localStorage.getItem('userRole') || '',
  autoRefreshTimer: null,
  search: '',
  logsFilter: { tunnelId: '', limit: 100 },
};

const NAV_ADMIN = [
  { id: 'dashboard', icon: 'bi-speedometer2', label: 'Dashboard' },
  { id: 'connections', icon: 'bi-broadcast', label: 'Connections' },
  { id: 'tunnels', icon: 'bi-diagram-3', label: 'Tunnels' },
  { id: 'users', icon: 'bi-people', label: 'Users' },
  { id: 'logs', icon: 'bi-journal-text', label: 'Request Logs' },
];
const NAV_USER = [
  { id: 'my-overview', icon: 'bi-speedometer2', label: 'Overview' },
  { id: 'my-tunnels', icon: 'bi-diagram-3', label: 'My Tunnels' },
  { id: 'my-logs', icon: 'bi-journal-text', label: 'My Logs' },
];

function buildNav() {
  const items = state.role === 'ADMIN' ? NAV_ADMIN : NAV_USER;
  state.tab = items[0].id;
  $('#nav').innerHTML = items.map((it, i) => `
    <a href="#" class="nav-link ${i === 0 ? 'active' : ''}" data-tab="${it.id}">
      <i class="bi ${it.icon}"></i> ${it.label}
    </a>`).join('');
  $('#sectionTitle').textContent = items[0].label;
  document.querySelectorAll('[data-tab]').forEach((b) => {
    b.addEventListener('click', (e) => {
      e.preventDefault();
      document.querySelectorAll('[data-tab]').forEach((x) => x.classList.remove('active'));
      b.classList.add('active');
      state.tab = b.dataset.tab;
      state.search = '';
      $('#sectionTitle').textContent = b.textContent.trim();
      render();
    });
  });
}

function setStatus(text, kind = 'muted') {
  const el = $('#status');
  el.className = `chip ${kind}`;
  el.innerHTML = kind === 'warn' ? `<span class="spinner me-1"></span>${text}` : text;
}

function esc(v) {
  if (v === null || v === undefined) return '';
  return String(v).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function copyRow(label, value, isSecret = false) {
  const id = 'cr_' + Math.random().toString(36).slice(2, 10);
  const safe = esc(value ?? '');
  const display = isSecret ? '••••••••••••••••' : safe;
  return `
    <div class="row g-2 align-items-center mb-2">
      <div class="col-sm-3 text-muted small">${esc(label)}</div>
      <div class="col-sm-9">
        <div class="input-group input-group-sm">
          <input id="${id}" type="text" class="form-control font-monospace" value="${display}" data-real="${safe}" data-secret="${isSecret ? '1' : '0'}" data-revealed="0" readonly>
          ${isSecret ? `<button class="btn btn-outline-secondary" type="button" onclick="toggleReveal('${id}')" title="Show/hide"><i class="bi bi-eye"></i></button>` : ''}
          <button class="btn btn-outline-secondary" type="button" onclick="copyValue('${id}', this)" title="Copy"><i class="bi bi-clipboard"></i></button>
        </div>
      </div>
    </div>`;
}

window.copyValue = async function (id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  const val = el.dataset.real ?? el.value;
  try {
    await navigator.clipboard.writeText(val);
    const icon = btn.querySelector('i');
    if (icon) { icon.classList.remove('bi-clipboard'); icon.classList.add('bi-check2'); setTimeout(() => { icon.classList.remove('bi-check2'); icon.classList.add('bi-clipboard'); }, 1200); }
  } catch {}
};

window.toggleReveal = function (id) {
  const el = document.getElementById(id);
  if (!el) return;
  const revealed = el.dataset.revealed === '1';
  el.value = revealed ? '••••••••••••••••' : el.dataset.real;
  el.dataset.revealed = revealed ? '0' : '1';
};

function fmtDate(v) {
  if (!v) return '—';
  const d = new Date(v);
  if (Number.isNaN(+d)) return esc(v);
  return d.toLocaleString();
}

function timeAgo(v) {
  if (!v) return '—';
  const d = new Date(v);
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}

async function api(path) {
  if (!state.token) throw new Error('token required');
  setStatus('loading', 'warn');
  const res = await fetch(path, { headers: { Authorization: `Bearer ${state.token}` } });
  if (res.status === 401 || res.status === 403) {
    setStatus('signed out', 'danger');
    state.token = ''; localStorage.removeItem('adminToken');
    showLogin();
    throw new Error('Session expired');
  }
  if (!res.ok) {
    setStatus(`HTTP ${res.status}`, 'danger');
    throw new Error(`HTTP ${res.status}`);
  }
  setStatus('live', 'success');
  return res.json();
}

function showLogin() {
  $('#loginView').classList.remove('d-none');
  $('#appView').classList.add('d-none');
  stopAutoRefresh();
}
function showApp() {
  $('#loginView').classList.add('d-none');
  $('#appView').classList.remove('d-none');
  const roleBadge = state.role === 'ADMIN'
    ? '<span class="chip info ms-1">ADMIN</span>'
    : '<span class="chip muted ms-1">USER</span>';
  $('#whoami').innerHTML = `<i class="bi bi-person-circle"></i> ${esc(state.user || '')} ${roleBadge}`;
  buildNav();
  render();
}

const RS = { 0:'CONNECTING', 1:'OPEN', 2:'CLOSING', 3:'CLOSED' };

function emptyState(icon, text) {
  return `<div class="empty"><i class="bi ${icon}"></i><div>${text}</div></div>`;
}

function tableCard(title, headers, rows, tools = '') {
  const body = rows.length
    ? `<div class="table-responsive"><table class="table table-sm align-middle mb-0">
        <thead><tr>${headers.map((h) => `<th>${h}</th>`).join('')}</tr></thead>
        <tbody>${rows.join('')}</tbody></table></div>`
    : emptyState('bi-inbox', 'No records');
  return `
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5>${title}</h5>
        <div>${tools}</div>
      </div>
      ${body}
    </div>`;
}

function kpi(label, value, sub, icon) {
  return `
    <div class="col-sm-6 col-xl-3">
      <div class="card position-relative h-100">
        <div class="card-body">
          <div class="kpi">
            <span class="label">${label}</span>
            <span class="value">${value}</span>
            <span class="sub">${sub}</span>
          </div>
          <i class="bi ${icon} icon"></i>
        </div>
      </div>
    </div>`;
}

const renderers = {
  async dashboard() {
    $('#toolbar').innerHTML = '';
    const [stats, conns, logs] = await Promise.all([
      api('/api/admin/stats'),
      api('/api/admin/connections'),
      api('/api/admin/logs?limit=10'),
    ]);
    const kpis = `
      <div class="row g-3 mb-3">
        ${kpi('Active connections', stats.activeConnections, 'WebSocket clients online', 'bi-broadcast')}
        ${kpi('Tunnels', stats.tunnels, `${stats.activeTunnels} active`, 'bi-diagram-3')}
        ${kpi('Users', stats.users, 'Registered accounts', 'bi-people')}
        ${kpi('Requests / 1h', stats.requestsLastHour, `${stats.totalRequests} total`, 'bi-activity')}
      </div>`;

    const connRows = conns.slice(0, 8).map((c) => `
      <tr>
        <td><code>${esc(c.tunnelId)}</code></td>
        <td><span class="chip ${c.readyState===1?'success':'muted'}"><span class="status-dot ${c.readyState===1?'on':'off'}"></span>${RS[c.readyState]||c.readyState}</span></td>
      </tr>`);
    const connCard = tableCard('Active connections', ['Tunnel ID', 'State'], connRows);

    const logRows = logs.map((l) => `
      <tr>
        <td class="mono" title="${esc(l.timestamp)}">${timeAgo(l.timestamp)}</td>
        <td class="mono"><code>${esc(l.tunnelId)}</code></td>
        <td><span class="chip info">${esc(l.method)}</span></td>
        <td class="mono">${esc(l.path)}</td>
        <td><span class="chip ${l.statusCode < 400 ? 'success' : 'danger'}">${l.statusCode}</span></td>
        <td class="mono text-secondary">${l.durationMs}ms</td>
      </tr>`);
    const logsCard = tableCard('Recent requests', ['Time', 'Tunnel', 'Method', 'Path', 'Status', 'Duration'], logRows);

    $('#view').innerHTML = `${kpis}<div class="row g-3"><div class="col-lg-5">${connCard}</div><div class="col-lg-7">${logsCard}</div></div>`;
  },

  async connections() {
    $('#toolbar').innerHTML = `
      <input id="searchInput" type="text" class="form-control form-control-sm search-input" style="max-width:320px" placeholder="Filter by tunnel ID..." value="${esc(state.search)}" />`;
    $('#searchInput').addEventListener('input', (e) => { state.search = e.target.value; renderers.connections(); });

    const data = await api('/api/admin/connections');
    const filtered = state.search ? data.filter((c) => c.tunnelId.includes(state.search)) : data;
    const rows = filtered.map((c) => `
      <tr>
        <td><code>${esc(c.tunnelId)}</code></td>
        <td><span class="chip ${c.readyState===1?'success':'muted'}"><span class="status-dot ${c.readyState===1?'on':'off'}"></span>${RS[c.readyState]||c.readyState}</span></td>
      </tr>`);
    $('#view').innerHTML = tableCard(`Connections <span class="chip muted ms-2">${filtered.length}</span>`, ['Tunnel ID', 'State'], rows);
  },

  async users() {
    $('#toolbar').innerHTML = '';
    const users = await api('/api/admin/users');
    const rows = users.map((u) => `
      <tr>
        <td class="mono">${u.id}</td>
        <td>${esc(u.email)}</td>
        <td><span class="chip ${u.role==='ADMIN'?'info':'muted'}">${esc(u.role)}</span></td>
        <td class="text-secondary">${fmtDate(u.createdAt)}</td>
      </tr>`);
    $('#view').innerHTML = tableCard(`Users <span class="chip muted ms-2">${users.length}</span>`, ['ID', 'Email', 'Role', 'Created'], rows);
  },

  async 'my-overview'() {
    $('#toolbar').innerHTML = '';
    const [tunnels, logs] = await Promise.all([api('/api/me/tunnels'), api('/api/me/logs?limit=10')]);
    const active = tunnels.filter((t) => t.status === 'active').length;
    const kpis = `
      <div class="row g-3 mb-3">
        ${kpi('My tunnels', tunnels.length, `${active} active`, 'bi-diagram-3')}
        ${kpi('Recent requests', logs.length, 'last 10', 'bi-activity')}
      </div>`;
    const rows = logs.map((l) => `
      <tr>
        <td class="text-secondary" title="${esc(l.timestamp)}">${timeAgo(l.timestamp)}</td>
        <td><code>${esc(l.tunnelId)}</code></td>
        <td><span class="chip info">${esc(l.method)}</span></td>
        <td class="mono">${esc(l.path)}</td>
        <td><span class="chip ${l.statusCode<400?'success':'danger'}">${l.statusCode}</span></td>
        <td class="mono text-secondary">${l.durationMs}ms</td>
      </tr>`);
    $('#view').innerHTML = kpis + tableCard('Recent requests', ['Time', 'Tunnel', 'Method', 'Path', 'Status', 'Duration'], rows);
  },

  async 'my-tunnels'() {
    $('#toolbar').innerHTML = '';
    const tunnels = await api('/api/me/tunnels');
    if (!tunnels.length) {
      $('#view').innerHTML = `
        <div class="card"><div class="card-body">
          ${emptyState('bi-diagram-3', 'You have no tunnels yet. Run: <code>node cli/client.js create</code>')}
        </div></div>`;
      return;
    }
    const cards = tunnels.map((t) => `
      <div class="card mb-3">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h5><i class="bi bi-diagram-3 me-2"></i><code>${esc(t.id)}</code></h5>
          <span class="chip ${t.status==='active'?'success':'muted'}">
            <span class="status-dot ${t.status==='active'?'on':'off'}"></span>${esc(t.status)}
          </span>
        </div>
        <div class="card-body">
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <div class="text-secondary small mb-1">Created</div>
              <div>${fmtDate(t.createdAt)}</div>
            </div>
            <div class="col-md-6">
              <div class="text-secondary small mb-1">Last connected</div>
              <div>${t.lastConnectedAt ? fmtDate(t.lastConnectedAt) : '—'}</div>
            </div>
          </div>
          <hr class="border-secondary opacity-25" />
          <h6 class="mb-2"><i class="bi bi-link-45deg me-1"></i>Connection info</h6>
          ${copyRow('Public URL', t.publicUrl)}

          <details class="mt-3">
            <summary><i class="bi bi-terminal me-1"></i>Example request</summary>
            <pre class="mono mt-2">curl ${esc(t.publicUrl)}</pre>
          </details>
        </div>
      </div>`);
    $('#view').innerHTML = cards.join('');
  },

  async 'my-logs'() {
    $('#toolbar').innerHTML = `
      <input id="filterLimit" type="number" class="form-control form-control-sm search-input" style="max-width:100px" placeholder="limit" value="${state.logsFilter.limit}" />
      <button id="applyFilter" class="btn btn-primary btn-sm">Apply</button>`;
    $('#applyFilter').addEventListener('click', () => {
      state.logsFilter.limit = Number($('#filterLimit').value) || 100;
      renderers['my-logs']();
    });
    const logs = await api(`/api/me/logs?limit=${state.logsFilter.limit}`);
    const rows = logs.map((l) => `
      <tr>
        <td class="text-secondary" title="${esc(l.timestamp)}">${timeAgo(l.timestamp)}</td>
        <td><code>${esc(l.tunnelId)}</code></td>
        <td><span class="chip info">${esc(l.method)}</span></td>
        <td class="mono">${esc(l.path)}</td>
        <td><span class="chip ${l.statusCode<400?'success':'danger'}">${l.statusCode}</span></td>
        <td class="mono text-secondary">${l.durationMs}ms</td>
        <td><details><summary><i class="bi bi-file-earmark-text"></i> view</summary><pre class="mono">${esc(l.rawRequest)}</pre></details></td>
      </tr>`);
    $('#view').innerHTML = tableCard(`My Logs <span class="chip muted ms-2">${logs.length}</span>`, ['Time', 'Tunnel', 'Method', 'Path', 'Status', 'Duration', 'Raw'], rows);
  },

  async tunnels() {
    $('#toolbar').innerHTML = `
      <input id="searchInput" type="text" class="form-control form-control-sm search-input" style="max-width:320px" placeholder="Filter..." value="${esc(state.search)}" />`;
    $('#searchInput').addEventListener('input', (e) => { state.search = e.target.value; renderers.tunnels(); });

    const tunnels = await api('/api/admin/tunnels');
    const q = state.search.toLowerCase();
    const filtered = q ? tunnels.filter((t) => t.id.toLowerCase().includes(q)) : tunnels;
    const rows = filtered.map((t) => `
      <tr>
        <td><code>${esc(t.id)}</code></td>
        <td class="mono">${t.userId}</td>
        <td><span class="chip ${t.status==='active'?'success':'muted'}"><span class="status-dot ${t.status==='active'?'on':'off'}"></span>${esc(t.status)}</span></td>
        <td class="text-secondary">${fmtDate(t.createdAt)}</td>
        <td class="text-secondary">${t.lastConnectedAt ? timeAgo(t.lastConnectedAt) : '—'}</td>
      </tr>`);
    $('#view').innerHTML = tableCard(`Tunnels <span class="chip muted ms-2">${filtered.length}</span>`, ['ID', 'User', 'Status', 'Created', 'Last connected'], rows);
  },

  async logs() {
    $('#toolbar').innerHTML = `
      <input id="filterTunnelId" type="text" class="form-control form-control-sm search-input" style="max-width:280px" placeholder="Filter by tunnel ID..." value="${esc(state.logsFilter.tunnelId)}" />
      <input id="filterLimit" type="number" class="form-control form-control-sm search-input" style="max-width:100px" placeholder="limit" value="${state.logsFilter.limit}" />
      <button id="applyFilter" class="btn btn-primary btn-sm">Apply</button>`;
    $('#applyFilter').addEventListener('click', () => {
      state.logsFilter.tunnelId = $('#filterTunnelId').value.trim();
      state.logsFilter.limit = Number($('#filterLimit').value) || 100;
      renderers.logs();
    });

    const qs = new URLSearchParams({ limit: state.logsFilter.limit });
    if (state.logsFilter.tunnelId) qs.set('tunnelId', state.logsFilter.tunnelId);
    const logs = await api('/api/admin/logs?' + qs.toString());
    const rows = logs.map((l) => `
      <tr>
        <td class="text-secondary" title="${esc(l.timestamp)}">${timeAgo(l.timestamp)}</td>
        <td><code>${esc(l.tunnelId)}</code></td>
        <td><span class="chip info">${esc(l.method)}</span></td>
        <td class="mono">${esc(l.path)}</td>
        <td><span class="chip ${l.statusCode < 400 ? 'success' : 'danger'}">${l.statusCode}</span></td>
        <td class="mono text-secondary">${l.durationMs}ms</td>
        <td><details><summary><i class="bi bi-file-earmark-text"></i> view</summary><pre class="mono">${esc(l.rawRequest)}</pre></details></td>
      </tr>`);
    $('#view').innerHTML = tableCard(`Request Logs <span class="chip muted ms-2">${logs.length}</span>`, ['Time', 'Tunnel', 'Method', 'Path', 'Status', 'Duration', 'Raw'], rows);
  },
};

async function render() {
  try {
    await renderers[state.tab]();
  } catch (e) {
    $('#view').innerHTML = `<div class="alert alert-danger">${esc(e.message)}</div>`;
  }
}

function startAutoRefresh() {
  stopAutoRefresh();
  state.autoRefreshTimer = setInterval(() => render(), 5000);
}
function stopAutoRefresh() {
  if (state.autoRefreshTimer) clearInterval(state.autoRefreshTimer);
  state.autoRefreshTimer = null;
}

$('#loginBtn').addEventListener('click', async () => {
  const email = $('#loginUser').value.trim();
  const password = $('#loginPassword').value;
  $('#loginError').classList.add('d-none');
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    if (!res.ok) throw new Error('Invalid credentials');
    const { apiKey, role } = await res.json();
    state.token = apiKey; state.user = email; state.role = role;
    localStorage.setItem('apiKey', apiKey);
    localStorage.setItem('userEmail', email);
    localStorage.setItem('userRole', role);
    showApp();
  } catch (e) {
    $('#loginError').textContent = e.message;
    $('#loginError').classList.remove('d-none');
  }
});
$('#loginPassword')?.addEventListener('keydown', (e) => { if (e.key === 'Enter') $('#loginBtn').click(); });

$('#logout').addEventListener('click', () => {
  state.token = ''; state.user = ''; state.role = '';
  localStorage.removeItem('apiKey'); localStorage.removeItem('userEmail'); localStorage.removeItem('userRole');
  showLogin();
});

$('#refresh').addEventListener('click', render);
$('#autoRefresh').addEventListener('change', (e) => { e.target.checked ? startAutoRefresh() : stopAutoRefresh(); });

if (state.token) showApp(); else showLogin();
</script>
</body>
</html>
